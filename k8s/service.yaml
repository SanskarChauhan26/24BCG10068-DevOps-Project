apiVersion: v1
kind: Service

metadata:
  name: college-event-service

spec:
  type: NodePort

  selector:
    app: college-event

  ports:
    - name: app
      port: 8081
      targetPort: 8081
      nodePort: 30091

    - name: actuator
      port: 9090
      targetPort: 9090
      nodePort: 30092