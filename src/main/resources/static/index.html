<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>College Event Manager</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fs-3 fw-bold" href="#">
                College Event Website
            </a>

        </div>

    </nav>

    <div class="container mt-5">

        <!-- Add Event -->
        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <h3>Add New Event</h3>

            </div>

            <div class="card-body">

                <form onsubmit="return false;">

                    <div class="mb-3">

                        <label class="form-label">Event Name</label>

                        <input
                            id="eventName"
                            type="text"
                            class="form-control"
                            placeholder="Enter Event Name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Description</label>

                        <textarea
                            id="description"
                            class="form-control"
                            rows="3"
                            placeholder="Enter Description"
                            required></textarea>

                    </div>

                    <div class="row">

                        <div class="col-md-3">

                            <label class="form-label">Foot Fall</label>

                            <input
                                id="footFall"
                                type="text"
                                class="form-control"
                                placeholder="Expected Foot Fall"
                                required>

                        </div>

                        <div class="col-md-3">

                            <label class="form-label">Guest</label>

                            <input
                                id="guest"
                                type="text"
                                class="form-control"
                                placeholder="Guest Name"
                                required>

                        </div>

                        <div class="col-md-3">

                            <label class="form-label">Date</label>

                            <input
                                id="date"
                                type="date"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-3">

                            <label class="form-label">Fees</label>

                            <input
                                id="fees"
                                type="number"
                                class="form-control"
                                placeholder="Fees"
                                required>

                        </div>

                    </div>

                    <br>

                    <button
                        id="addButton"
                        type="button"
                        onclick="addEvent()"
                        class="btn btn-success w-100">

                        Add Event

                    </button>

                </form>

            </div>

        </div>

        <br>

        <!-- Event List -->
        <div class="card shadow">

            <div class="card-header bg-dark text-white">

                <h3>Event List</h3>

            </div>

            <div class="card-body">

                <table class="table table-bordered table-hover">

                    <thead class="table-primary">

                        <tr>

                            <th>ID</th>
                            <th>Event Name</th>
                            <th>Description</th>
                            <th>Foot Fall</th>
                            <th>Guest</th>
                            <th>Date</th>
                            <th>Fees</th>
                            <th width="170">Action</th>

                        </tr>

                    </thead>

                    <tbody id="eventTable">

                        <!-- Events will be loaded dynamically -->

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
